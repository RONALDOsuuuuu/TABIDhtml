<HTML>
    <head>
        <style>
            .grid-item1 { grid-area: header;}
            .grid-item2 { grid-area: menu;}
            .grid-item3 { grid-area: main;}
            .grid-item4 { grid-area: footer;}
            .grid-container {
                display: grid;
                grid-template-columns: auto auto auto auto auto;
                grid-template-areas: 
                'header header header header header'
                'menu main main main main'
                'menu footer footer footer footer';
                background-color: aqua;
                padding: 10px;
            }
            .grid-conteier div {
                background-color: rgb(18, 226, 188);
                text-align: center;
                padding: 20px;
                border: 3px rgb(0, 0, 0);
            }
        </style>
    </head>
    <body>
        <div class="grid-container">
        <div class="grid-item1">Header</div>
        <div class="grid-item2">Menu</div>
        <div class="grid-item3">Mein</div>
        <div class="grid-item4">Footer</div>
        </div>
    </body>
</HTML>
