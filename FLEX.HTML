<html>
    <head>
        <style>
            .flex-container{
                display: flex;
                width: 200px;
                background-color: blue;
                padding: 20px;
            }
            flex1-containe{
                display: flex;
                flex-direction: column-reverse;
                width: 200px;
                 background-color: blue;
                padding: 20px;
            }
            .flex-container div{
                width: 200px;
                background-color: rgb(255, 255, 255);
                margin: 5px;
                padding: 5px;
            }
        </style>
    </head>
    <body>
        <div class="flex-container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
       </div>
       <div class="flex1-container">
        <div>A</div>
        <div>B</div>
        <div>C</div>
       </div>
        </body>
</html>
