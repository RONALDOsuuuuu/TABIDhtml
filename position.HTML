<html>
    <head>
        <style>
            div {
                right: 30px;
                border: 3px solid #73ad21;
            }
            div.absolute {
                position: absolute;
                left: 50px;
            }
            div.fixed {
                position: fixed;
                top: 0%;
                right: 20px;
                width: 100px;
                border: 3px solid 373AD21;
            }
            div.stiky
               position: stiky;
               top: 1px;
               left: 20px;
               width: 100px;
               border; 3px solid #73AD21;
        </style>
    </head>
    <body>
       <h2>POSITIONING</h2>
       <Div>
        Div with no position property
        </Div>
        <div class="sticly">
            Div with sticly postion property
        </div>
        <div class="relative">
            This dive elemant has position: relative
        <div class="absolute">
            Absolute class DIV
        </div>
    </div>
    <div class="fixed">
        Div with fix position property
    </div>
    <div style="height: 1800px; border: none;">
    </div>
    </body>
</html>
